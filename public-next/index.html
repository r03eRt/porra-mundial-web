<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porra</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loader-stadium">
        <div class="loader-trophy-ring"></div>
        <div class="loader-trophy">🏆</div>
        <div class="loader-pitch-circle"></div>
        <div class="loader-center-line"></div>
        <div class="loader-flag-ring">
          <span class="loader-flag loader-flag--1">🇪🇸</span>
          <span class="loader-flag loader-flag--2">🇧🇷</span>
          <span class="loader-flag loader-flag--3">🇦🇷</span>
          <span class="loader-flag loader-flag--4">🇫🇷</span>
        </div>
        <span class="loader-ball-match">⚽</span>
      </div>
      <p class="loader-text">Cargando porra...</p>
      <p class="loader-sub">⚽ Preparando clasificación y partidos</p>
    </div>
    <header class="hero">
      <div>
        <p class="eyebrow">Porra</p>
        <h1 id="porra-title">Porra</h1>
        <p id="porra-subtitle" class="subtitle"></p>
      </div>
      <div class="hero-actions">
        <div id="session" class="session"></div>
      </div>
    </header>
    <section id="summary" class="cards"></section>
    <nav id="tabs" class="tabs"></nav>
    <main id="app"></main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
